{% extends "base.html" %}
{% block title %}OwlSwap — Login{% endblock %}
 
{% block content %}
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-logo">
      <div class="auth-logo-icon">🦉</div>
      <div class="auth-logo-text">OwlSwap</div>
    </div>
 
    <div class="auth-tabs">
      <a href="{{ url_for('auth.login') }}" class="auth-tab active">Login</a>
      <a href="{{ url_for('auth.register') }}" class="auth-tab">Sign Up</a>
    </div>
 
    <form method="POST" action="{{ url_for('auth.login') }}">
 
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="yourname@southernct.edu"
               value="{{ request.form.get('email', '') }}"
               required />
      </div>
 
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required />
      </div>
 
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;">
        <input type="checkbox" id="remember_me" name="remember_me"
               style="width:auto;accent-color:#1a3a6b;" />
        <label for="remember_me"
               style="font-size:13px;color:#4a5568;text-transform:none;letter-spacing:0;margin:0;">
          Remember me
        </label>
      </div>
 
      <button type="submit" class="auth-submit">Log In</button>
    </form>
 
    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Sign up</a>
    </div>
 
  </div>
</div>
{% endblock %}
