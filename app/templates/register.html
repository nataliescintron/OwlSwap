{% extends "base.html" %}
{% block title %}OwlSwap — Sign Up{% endblock %}
 
{% block content %}
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-logo">
      <div class="auth-logo-icon">🦉</div>
      <div class="auth-logo-text">OwlSwap</div>
    </div>
 
    <div class="auth-tabs">
      <a href="{{ url_for('auth.login') }}" class="auth-tab">Login</a>
      <a href="{{ url_for('auth.register') }}" class="auth-tab active">Sign Up</a>
    </div>
 
    <form method="POST" action="{{ url_for('auth.register') }}">
 
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="e.g. jsmith22"
               value="{{ request.form.get('username', '') }}"
               required />
      </div>
 
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="yourname@southernct.edu"
               value="{{ request.form.get('email', '') }}"
               required />
      </div>
 
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="•••••••• (min 6 characters)" required />
      </div>
 
      <div class="field">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="••••••••" required />
      </div>
 
      <button type="submit" class="auth-submit">Create Account</button>
    </form>
 
    <div class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>
 
  </div>
</div>
{% endblock %}
