{% extends "base.html" %}
{% block title %}Report User{% endblock %}

{% block content %}

<div style="max-width:650px;margin:50px auto;background:white;border:1px solid #e4e9f2;
            border-radius:18px;padding:32px;box-shadow:0 4px 14px rgba(15,23,42,0.06);">

  <h1 style="margin:0;color:#1e2535;font-size:28px;">Report User</h1>

  <p style="color:#6b7892;margin-top:10px;">
    You are reporting {{ reported_user.f_name }} {{ reported_user.l_name }}.
  </p>

  <form method="POST" style="margin-top:24px;">

    <label style="font-weight:700;color:#1e2535;">Reason</label>
    <select name="reason" required
            style="width:100%;margin-top:8px;margin-bottom:18px;padding:12px;
                   border:1.5px solid #cdd4e4;border-radius:8px;font-size:14px;">
      <option value="">Select a reason</option>
      <option value="Sexual Harassment">Sexual Harassment</option>
      <option value="Harassment">Harassment</option>
      <option value="Inappropriate Language">Inappropriate Language</option>
      <option value="Scam or Suspicious Behavior">Scam or Suspicious Behavior</option>
      <option value="Threats">Threats</option>
      <option value="Other">Other</option>
    </select>

    <label style="font-weight:700;color:#1e2535;">Describe what happened</label>
    <textarea name="description" rows="6" required
              placeholder="Explain the issue..."
              style="width:100%;margin-top:8px;padding:12px;border:1.5px solid #cdd4e4;
                     border-radius:8px;font-size:14px;font-family:Arial,sans-serif;"></textarea>

    <button type="submit"
            style="margin-top:22px;background:#b42318;color:white;border:none;
                   padding:12px 20px;border-radius:8px;font-weight:700;cursor:pointer;">
      Submit Report
    </button>

  </form>

</div>

{% endblock %}
